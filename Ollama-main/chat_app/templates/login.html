<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #1a1f3a;
            --card: #1f2847;
            --accent-1: #00d4ff;
            --accent-2: #7c3aed;
            --accent-3: #ec4899;
            --text: #f0f9ff;
            --text-muted: #94a3b8;
            --error: #ff6b6b;
            --success: #51cf66;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a0f2e 50%, #0f1f3f 100%);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* Animated background orbs */
        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            animation: float 15s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite reverse;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0px, 0px); }
            50% { transform: translate(30px, -30px); }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-weight: 900;
            letter-spacing: -2px;
            font-size: 3.5rem;
            text-align: center;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 50%, var(--accent-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .auth-box {
            background: rgba(31, 40, 71, 0.4);
            padding: 48px;
            border-radius: 28px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(20px);
            transition: all 0.4s ease;
        }

        .auth-box:hover {
            border-color: rgba(124, 58, 237, 0.4);
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.2), inset 0 0 20px rgba(124, 58, 237, 0.15);
        }

        .form-title {
            text-align: center;
            margin-bottom: 32px;
            font-weight: 800;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 2px solid rgba(0, 212, 255, 0.2);
            background: rgba(10, 14, 39, 0.5);
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
        }

        input:focus {
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.15);
            background: rgba(10, 14, 39, 0.7);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        button {
            width: 100%;
            padding: 14px 18px;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            color: var(--bg-primary);
            transition: all 0.3s ease;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        .toggle-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .toggle-link a {
            color: var(--accent-1);
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .toggle-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            transition: width 0.3s ease;
        }

        .toggle-link a:hover::after {
            width: 100%;
        }

        .form-hidden {
            display: none;
            animation: fadeOut 0.3s ease;
        }

        .form-group:not(.form-hidden) {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        .error {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.15) 0%, rgba(255, 107, 107, 0.05) 100%);
            border: 1.5px solid rgba(255, 107, 107, 0.5);
            color: #ff9999;
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            animation: slideInError 0.4s ease;
        }

        .success {
            background: linear-gradient(135deg, rgba(81, 207, 102, 0.15) 0%, rgba(81, 207, 102, 0.05) 100%);
            border: 1.5px solid rgba(81, 207, 102, 0.5);
            color: #a8f59f;
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            animation: slideInSuccess 0.4s ease;
        }

        @keyframes slideInError {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInSuccess {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Chats with Walter ✨</h1>

    <div class="auth-box">
        <!-- Login Form -->
        <div id="loginForm">
            <div class="form-title">🔓 Welcome Back</div>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="login-email">📧 Email</label>
                    <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">🔑 Password</label>
                    <input type="password" id="login-password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit">✨ Sign In</button>
            </form>
            <div class="toggle-link">
                Don't have an account? <a onclick="toggleForms()">Create one</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-hidden">
            <div class="form-title">🚀 Join the Fun</div>
            {% if signup_error %}<div class="error">{{ signup_error }}</div>{% endif %}
            {% if signup_success %}<div class="success">{{ signup_success }}</div>{% endif %}
            <form method="POST" action="/signup">
                <div class="form-group">
                    <label for="signup-email">📧 Email</label>
                    <input type="email" id="signup-email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">🔑 Password</label>
                    <input type="password" id="signup-password" name="password" placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="signup-confirm">✓ Confirm Password</label>
                    <input type="password" id="signup-confirm" name="confirm_password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit">🎉 Create Account</button>
            </form>
            <div class="toggle-link">
                Already have an account? <a onclick="toggleForms()">Sign in</a>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleForms() {
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        loginForm.classList.toggle('form-hidden');
        signupForm.classList.toggle('form-hidden');
    }
</script>

</body>
</html>
